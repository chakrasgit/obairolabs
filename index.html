<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obairo · Activity Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #090c12;
    --panel: #0d1119;
    --panel-raised: #121828;
    --line: #24314a;
    --line-soft: #171f30;
    --text: #e9edf5;
    --text-dim: #a2b0c9;
    --text-faint: #7186a5;
    --accent: #4f8dff;
    --accent-soft: #8ab4ff;
    --accent-dim: #1c3766;
    --red: #ff6b6b;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }
  html, body{ background: var(--bg); }

  body{
    font-family: var(--font-body);
    color: var(--text);
    padding: 32px 20px 60px;
    line-height: 1.5;
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size: 42px 42px;
    background-position: -1px -1px;
  }

  .console{ max-width: 1180px; margin: 0 auto; }

  /* ---------- Header ---------- */
  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 20px;
    margin-bottom: 28px;
  }
  .brand-eyebrow{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--accent-soft);
    text-transform: uppercase;
    margin-bottom: 8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand-eyebrow::before{
    content:"";
    width:7px; height:7px;
    background: var(--accent);
    border-radius:50%;
    box-shadow: 0 0 8px var(--accent);
    display:inline-block;
  }
  .brand-title{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(26px, 4vw, 38px);
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  .social-bar{ display:flex; gap: 8px; flex-wrap: wrap; }
  .social-link{
    width: 30px; height: 30px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    border: 1px solid var(--line);
    color: var(--text-dim);
    transition: all .15s ease;
  }
  .social-link:hover{ border-color: var(--accent); color: var(--accent-soft); background: rgba(79,141,255,0.1); }
  .social-link.placeholder{ opacity: .4; cursor: default; }
  .social-link svg{ width: 15px; height: 15px; }
  .topbar-meta{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-faint);
    text-align: right;
  }
  .topbar-meta strong{ color: var(--text-dim); }

  /* ---------- Hero stat ---------- */
  .stat-hero{
    display:inline-flex;
    flex-direction:column;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--line);
    padding: 18px 28px;
    margin-bottom: 24px;
  }
  .stat-label{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .stat-value{
    font-family: var(--font-display);
    font-size: 34px;
    font-weight: 700;
    color: var(--accent-soft);
  }

  /* ---------- Panels ---------- */
  .panel{
    background: var(--panel);
    border: 1px solid var(--line);
    margin-bottom: 20px;
  }
  .panel-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    flex-wrap: wrap;
    gap: 10px;
  }
  .panel-title{
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .panel-body{ padding: 18px; }

  /* ---------- Chart ---------- */
  .year-select{
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 3px;
  }
  .chart-row{
    display:flex;
    align-items:flex-end;
    gap: 6px;
    height: 140px;
    padding-top: 10px;
  }
  .chart-col{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
    height:100%;
    gap: 6px;
  }
  .chart-bar-wrap{
    flex:1;
    display:flex;
    align-items:flex-end;
    width:100%;
    justify-content:center;
  }
  .chart-bar{
    width: 60%;
    min-width: 8px;
    background: linear-gradient(180deg, var(--accent), var(--accent-dim));
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: height .3s ease;
  }
  .chart-bar[data-count="0"]{ background: var(--line); }
  .chart-count{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
  }
  .chart-label{
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  /* ---------- Category breakdown ---------- */
  .cat-list{ display:flex; flex-direction:column; gap: 10px; }
  .cat-row{
    display:grid;
    grid-template-columns: 150px 1fr 40px;
    align-items:center;
    gap: 12px;
  }
  .cat-name{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow:hidden;
    text-overflow: ellipsis;
  }
  .tick-track{
    height: 14px;
    background: repeating-linear-gradient(90deg, var(--line-soft), var(--line-soft) 3px, transparent 3px, transparent 7px);
    border: 1px solid var(--line);
    position: relative;
  }
  .tick-fill{
    height:100%;
    background: var(--accent);
    opacity: 0.85;
  }
  .cat-count{
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text);
    text-align:right;
  }

  /* ---------- Platform breakdown ---------- */
  .platform-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .platform-cell{
    border: 1px solid var(--line);
    background: var(--panel-raised);
    padding: 12px 14px;
  }
  .platform-name{
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-faint);
    margin-bottom: 8px;
  }
  .platform-count{
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
  }
  .platform-sub{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .platform-bar{
    height: 4px;
    background: var(--line-soft);
    margin-top: 8px;
    overflow:hidden;
  }
  .platform-bar-fill{ height:100%; background: var(--accent); }

  /* ---------- Filters ---------- */
  .filters{
    display:flex;
    flex-wrap:wrap;
    gap: 10px 16px;
    align-items:flex-end;
  }
  .filter-group{ display:flex; flex-direction:column; gap:6px; position: relative; }
  .filter-label{
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  select, input[type="date"]{
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 7px 10px;
    border-radius: 3px;
    min-width: 150px;
  }

  .dropdown-toggle{
    background: var(--panel-raised);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12.5px;
    padding: 7px 10px;
    border-radius: 3px;
    min-width: 170px;
    text-align:left;
    cursor:pointer;
  }
  .dropdown-toggle:hover{ border-color: var(--accent-dim); }
  .dropdown-menu{
    display:none;
    position:absolute;
    top: calc(100% + 4px);
    left:0;
    z-index: 20;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 3px;
    min-width: 210px;
    max-height: 240px;
    overflow-y:auto;
    padding: 6px;
  }
  .dropdown-menu.open{ display:block; }
  .dropdown-item{
    display:flex;
    align-items:center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    padding: 6px 8px;
    cursor:pointer;
    border-radius: 3px;
  }
  .dropdown-item:hover{ background: var(--line-soft); color: var(--text); }
  .dropdown-item input{ accent-color: var(--accent); }

  .type-toggle{ display:flex; gap:4px; }
  .type-btn{
    font-family: var(--font-mono);
    font-size: 11.5px;
    padding: 7px 12px;
    border: 1px solid var(--line);
    background: var(--panel-raised);
    color: var(--text-dim);
    cursor:pointer;
    border-radius: 3px;
  }
  .type-btn.active{ border-color: var(--accent); color: var(--accent-soft); }
  .reset-btn{
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    background: none;
    border: 1px solid var(--line);
    padding: 7px 12px;
    cursor: pointer;
    border-radius: 3px;
  }
  .reset-btn:hover{ color: var(--red); border-color: var(--red); }

  /* ---------- Table ---------- */
  table{ width:100%; border-collapse: collapse; }
  thead th{
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--text-faint);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    white-space: nowrap;
  }
  tbody td{
    padding: 12px;
    border-bottom: 1px solid var(--line-soft);
    font-size: 13px;
    vertical-align: middle;
  }
  tbody tr:hover{ background: var(--panel-raised); }
  .serial{ font-family: var(--font-mono); color: var(--accent-soft); font-size: 12px; }
  .title-cell{ max-width: 320px; }
  .title-cell a{ color: var(--text); text-decoration:none; }
  .title-cell a:hover{ text-decoration: underline; color: var(--accent-soft); }
  .cat-badge{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--accent-soft);
    border: 1px solid var(--accent-dim);
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .type-badge{
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .date-cell{ font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); white-space:nowrap; }

  .badge-row{ display:flex; gap: 5px; }
  .platform-badge{
    width: 20px; height: 20px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 600;
    border: 1px solid var(--line);
    color: var(--text-faint);
    background: transparent;
    position: relative;
  }
  .platform-badge.posted{
    background: var(--accent);
    border-color: var(--accent);
    color: #06101f;
  }
  .platform-badge a{ position:absolute; inset:0; border-radius:50%; }

  .empty-state{
    text-align:center;
    padding: 40px 20px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--text-faint);
  }

  @media (max-width: 720px){
    .cat-row{ grid-template-columns: 100px 1fr 32px; }
    table{ font-size: 11px; }
    .title-cell{ max-width: 160px; }
  }
</style>
</head>
<body>

<div class="console">

  <div class="topbar">
    <div>
      <div class="brand-eyebrow">Content Tracking System</div>
      <div class="brand-title">OBAIRO <span style="color:var(--text-dim); font-weight:500;">· Activity Console</span></div>
      <div class="social-bar" id="socialBar"></div>
    </div>
    <div class="topbar-meta">
      TRACKING SINCE <strong id="trackingSince">·</strong><br>
      <span id="lastUpdated">·</span>
    </div>
  </div>

  <!-- HERO STAT -->
  <div class="stat-hero">
    <div class="stat-label">Total Videos</div>
    <div class="stat-value" id="totalVideos">0</div>
  </div>

  <!-- CHART -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Posts / Month</div>
      <select class="year-select" id="yearSelect"></select>
    </div>
    <div class="panel-body">
      <div class="chart-row" id="chartRow"></div>
    </div>
  </div>

  <!-- CATEGORY BREAKDOWN -->
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Category Breakdown</div></div>
    <div class="panel-body">
      <div class="cat-list" id="catList"></div>
    </div>
  </div>

  <!-- PLATFORM BREAKDOWN -->
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Videos Per Platform</div></div>
    <div class="panel-body">
      <div class="platform-grid" id="platformGrid"></div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="panel">
    <div class="panel-head"><div class="panel-title">Filters</div>
      <button class="reset-btn" id="resetFilters">Reset all</button>
    </div>
    <div class="panel-body">
      <div class="filters">
        <div class="filter-group">
          <div class="filter-label">Category</div>
          <button class="dropdown-toggle" id="categoryDropdownBtn" type="button">All categories</button>
          <div class="dropdown-menu" id="categoryMenu"></div>
        </div>
        <div class="filter-group">
          <div class="filter-label">Video Type</div>
          <div class="type-toggle" id="typeToggle">
            <button class="type-btn active" data-type="all">All</button>
            <button class="type-btn" data-type="short">Short</button>
            <button class="type-btn" data-type="long">Long</button>
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-label">Platform</div>
          <select id="platformFilter">
            <option value="all">All platforms</option>
            <option value="youtube">YouTube</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="threads">Threads</option>
            <option value="x">X</option>
            <option value="reddit">Reddit</option>
            <option value="linkedin">LinkedIn</option>
          </select>
        </div>
        <div class="filter-group">
          <div class="filter-label">From</div>
          <input type="date" id="dateFrom" min="2026-06-01" max="2032-12-31">
        </div>
        <div class="filter-group">
          <div class="filter-label">To</div>
          <input type="date" id="dateTo" min="2026-06-01" max="2032-12-31">
        </div>
      </div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="panel">
    <div class="panel-head">
      <div class="panel-title">Activity Log</div>
      <div class="panel-title" id="rowCount">0 records</div>
    </div>
    <div class="panel-body" style="padding:0;">
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Category</th>
              <th>Type</th>
              <th>Date</th>
              <th>Platforms</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">No records match the current filters.</div>
    </div>
  </div>

</div>

<script>
const PLATFORMS = [
  { key: "youtube",   label: "YouTube",   letter: "Y" },
  { key: "instagram", label: "Instagram", letter: "I" },
  { key: "facebook",  label: "Facebook",  letter: "F" },
  { key: "threads",   label: "Threads",   letter: "T" },
  { key: "x",         label: "X",         letter: "X" },
  { key: "reddit",    label: "Reddit",    letter: "R" },
  { key: "linkedin",  label: "LinkedIn",  letter: "L" }
];

const SOCIAL_LINKS = [
  { key: "youtube", label: "YouTube", url: "https://www.youtube.com/@ObairoLabs",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="1" y="5" width="22" height="14" rx="4"/><path d="M10 9l6 3-6 3z" fill="currentColor" stroke="none"/></svg>' },
  { key: "instagram", label: "Instagram", url: "https://www.instagram.com/obairolabs/",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="20" height="20" rx="6"/><circle cx="12" cy="12" r="5"/><circle cx="18" cy="6" r="1.2" fill="currentColor" stroke="none"/></svg>' },
  { key: "linkedin", label: "LinkedIn", url: "https://www.linkedin.com/in/chakradharmantena/",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="20" height="20" rx="4"/><circle cx="7.5" cy="8" r="1.2" fill="currentColor" stroke="none"/><rect x="6.3" y="10.5" width="2.4" height="7" fill="currentColor" stroke="none"/><path d="M11 10.5h2.3v1.2c.5-.8 1.3-1.4 2.6-1.4 2 0 3.1 1.3 3.1 3.7v4.5h-2.4v-4c0-1.1-.4-1.8-1.4-1.8-.8 0-1.3.5-1.5 1-.1.2-.1.5-.1.8v4h-2.4v-8z" fill="currentColor" stroke="none"/></svg>' },
  { key: "threads", label: "Threads", url: "https://www.threads.com/@obairolabs",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0"><path d="M12 2C6.5 2 3 5.8 3 12c0 5.2 3 10 9 10 3 0 5-1 6.3-2.7l-1.7-1.4C15.7 19 14.3 19.6 12 19.6c-4 0-6.2-3-6.2-7.6 0-4.7 2.3-7.6 6.2-7.6 3.6 0 5.6 2.2 5.9 5.3.1 1.4-.2 2.4-.9 3-.5.4-1.1.5-1.6.3-.5-.2-.7-.7-.6-1.5l.4-3.4h-2l-.1.6c-.5-.6-1.2-.9-2-.9-1.9 0-3.3 1.6-3.3 3.9 0 2.1 1.3 3.6 3.1 3.6.9 0 1.7-.4 2.3-1.1.4.6 1.1 1 2 1 1.2 0 2.3-.5 3-1.4 1-1.2 1.4-2.8 1.2-4.6C20.4 5.2 17.1 2 12 2z" fill="currentColor"/></svg>' },
  { key: "x", label: "X", url: "https://x.com/ObairoLabs",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 4l16 16M20 4L4 20"/></svg>' },
  { key: "reddit", label: "Reddit", url: "https://www.reddit.com/user/obairolabs/",
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="13" r="7"/><circle cx="9" cy="13" r="1.1" fill="currentColor" stroke="none"/><circle cx="15" cy="13" r="1.1" fill="currentColor" stroke="none"/><path d="M8.5 16.3c1 .8 2.2 1.2 3.5 1.2s2.5-.4 3.5-1.2" stroke-linecap="round"/><circle cx="12" cy="6" r="1" fill="currentColor" stroke="none"/><path d="M12 7v2"/></svg>' },
  { key: "facebook", label: "Facebook (coming soon)", url: "#", placeholder: true,
    icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="20" height="20" rx="6"/><path d="M14 8h-2a2 2 0 0 0-2 2v2H8v3h2v6h3v-6h2.2l.4-3H13v-1.5c0-.5.2-.8.9-.8H14V8z" fill="currentColor" stroke="none"/></svg>' }
];

const YEARS = [2026, 2027, 2028, 2029, 2030, 2031, 2032];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let ACTIVITY = [];
let CATEGORIES = [];
let filters = {
  categories: new Set(),   // empty set = all categories
  type: "all",
  platform: "all",
  dateFrom: null,
  dateTo: null,
  year: new Date().getFullYear() >= 2026 && new Date().getFullYear() <= 2032 ? new Date().getFullYear() : 2026
};

function renderSocialBar(){
  document.getElementById('socialBar').innerHTML = SOCIAL_LINKS.map(s => `
    <a class="social-link${s.placeholder ? ' placeholder' : ''}" href="${s.url}" title="${s.label}" target="_blank" rel="noopener">${s.icon}</a>
  `).join('');
}

async function loadData(){
  try{
    const [activityRes, categoriesRes] = await Promise.all([
      fetch('data/activity.json'),
      fetch('data/categories.json')
    ]);
    ACTIVITY = await activityRes.json();
    CATEGORIES = await categoriesRes.json();
  }catch(e){
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="6" style="padding:20px;font-family:var(--font-mono);color:var(--text-faint);">Could not load data/activity.json. If you opened this file directly, run a local server (e.g. `python -m http.server`) instead of double-clicking index.html.</td></tr>';
    return;
  }
  document.getElementById('lastUpdated').textContent = 'RECORDS: ' + ACTIVITY.length;
  if(ACTIVITY.length){
    const earliest = ACTIVITY.reduce((min, d) => d.date_posted < min ? d.date_posted : min, ACTIVITY[0].date_posted);
    document.getElementById('trackingSince').textContent = earliest;
  }
  renderSocialBar();
  initFilters();
  renderAll();
}

function initFilters(){
  // year select
  const yearSelect = document.getElementById('yearSelect');
  yearSelect.innerHTML = YEARS.map(y => `<option value="${y}">${y}</option>`).join('');
  yearSelect.value = filters.year;
  yearSelect.addEventListener('change', () => { filters.year = parseInt(yearSelect.value); renderChart(); });

  // category dropdown (multi-select)
  const menu = document.getElementById('categoryMenu');
  const btn = document.getElementById('categoryDropdownBtn');
  menu.innerHTML = CATEGORIES.map(c => `
    <label class="dropdown-item">
      <input type="checkbox" value="${c}"> ${c}
    </label>
  `).join('');
  menu.querySelectorAll('input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      if(cb.checked) filters.categories.add(cb.value);
      else filters.categories.delete(cb.value);
      updateCategoryLabel();
      renderTable(); renderStats();
    });
  });
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    menu.classList.toggle('open');
  });
  document.addEventListener('click', () => menu.classList.remove('open'));
  menu.addEventListener('click', e => e.stopPropagation());

  // type toggle
  document.querySelectorAll('.type-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.type-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      filters.type = b.dataset.type;
      renderTable(); renderStats();
    });
  });

  // platform filter
  document.getElementById('platformFilter').addEventListener('change', e => {
    filters.platform = e.target.value;
    renderTable();
  });

  // date range
  document.getElementById('dateFrom').addEventListener('change', e => { filters.dateFrom = e.target.value || null; renderTable(); renderStats(); });
  document.getElementById('dateTo').addEventListener('change', e => { filters.dateTo = e.target.value || null; renderTable(); renderStats(); });

  // reset
  document.getElementById('resetFilters').addEventListener('click', () => {
    filters.categories.clear();
    filters.type = "all";
    filters.platform = "all";
    filters.dateFrom = null;
    filters.dateTo = null;
    menu.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    updateCategoryLabel();
    document.querySelectorAll('.type-btn').forEach(b2 => b2.classList.remove('active'));
    document.querySelector('.type-btn[data-type="all"]').classList.add('active');
    document.getElementById('platformFilter').value = "all";
    document.getElementById('dateFrom').value = "";
    document.getElementById('dateTo').value = "";
    renderTable(); renderStats();
  });
}

function updateCategoryLabel(){
  const btn = document.getElementById('categoryDropdownBtn');
  const n = filters.categories.size;
  btn.textContent = n === 0 ? "All categories" : n + " selected";
}

function getFiltered(){
  return ACTIVITY.filter(item => {
    if(filters.categories.size > 0 && !filters.categories.has(item.category)) return false;
    if(filters.type !== "all" && item.video_type !== filters.type) return false;
    if(filters.platform !== "all"){
      if(!item.platforms[filters.platform]) return false;
    }
    if(filters.dateFrom && item.date_posted < filters.dateFrom) return false;
    if(filters.dateTo && item.date_posted > filters.dateTo) return false;
    return true;
  });
}

function renderAll(){
  renderStats();
  renderChart();
  renderCategoryBreakdown();
  renderPlatformBreakdown();
  renderTable();
}

function renderStats(){
  const total = getFiltered().length;
  document.getElementById('totalVideos').textContent = total;
}

function renderChart(){
  const counts = new Array(12).fill(0);
  ACTIVITY.forEach(item => {
    const [y, m] = item.date_posted.split('-').map(Number);
    if(y === filters.year) counts[m-1]++;
  });
  const max = Math.max(1, ...counts);
  document.getElementById('chartRow').innerHTML = counts.map((c, i) => `
    <div class="chart-col">
      <div class="chart-count">${c || ''}</div>
      <div class="chart-bar-wrap">
        <div class="chart-bar" data-count="${c}" style="height:${c ? Math.max(6, (c/max)*100) : 0}%"></div>
      </div>
      <div class="chart-label">${MONTHS[i]}</div>
    </div>
  `).join('');
}

function renderCategoryBreakdown(){
  const counts = {};
  CATEGORIES.forEach(c => counts[c] = 0);
  ACTIVITY.forEach(item => { counts[item.category] = (counts[item.category] || 0) + 1; });
  const max = Math.max(1, ...Object.values(counts));
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);

  document.getElementById('catList').innerHTML = sorted.map(([cat, count]) => `
    <div class="cat-row">
      <div class="cat-name">${cat}</div>
      <div class="tick-track"><div class="tick-fill" style="width:${(count/max)*100}%"></div></div>
      <div class="cat-count">${count}</div>
    </div>
  `).join('');
}

function renderPlatformBreakdown(){
  const maxCount = Math.max(1, ...PLATFORMS.map(p => ACTIVITY.filter(item => item.platforms[p.key]).length));
  document.getElementById('platformGrid').innerHTML = PLATFORMS.map(p => {
    const count = ACTIVITY.filter(item => item.platforms[p.key]).length;
    const pct = Math.round((count/maxCount)*100);
    return `
      <div class="platform-cell">
        <div class="platform-name">${p.label}</div>
        <div class="platform-count">${count}</div>
        <div class="platform-sub">videos posted</div>
        <div class="platform-bar"><div class="platform-bar-fill" style="width:${pct}%"></div></div>
      </div>
    `;
  }).join('');
}

function renderTable(){
  const data = getFiltered().slice().sort((a,b) => b.date_posted.localeCompare(a.date_posted) || b.id - a.id);
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');
  document.getElementById('rowCount').textContent = data.length + " record" + (data.length === 1 ? "" : "s");

  if(data.length === 0){
    tbody.innerHTML = "";
    emptyState.style.display = "block";
    return;
  }
  emptyState.style.display = "none";

  tbody.innerHTML = data.map(item => {
    const serial = "OBR-" + String(item.id).padStart(4, "0");
    const titleHtml = item.source_url
      ? `<a href="${item.source_url}" target="_blank" rel="noopener">${item.title}</a>`
      : item.title;
    const badges = PLATFORMS.map(p => {
      const info = item.platforms[p.key];
      const posted = !!info;
      const url = typeof info === 'string' ? info : null;
      const cls = posted ? 'platform-badge posted' : 'platform-badge';
      const inner = url ? `<a href="${url}" target="_blank" rel="noopener"></a>${p.letter}` : p.letter;
      return `<span class="${cls}" title="${p.label}: ${posted ? 'posted' : 'not posted'}">${inner}</span>`;
    }).join('');

    return `
      <tr>
        <td class="serial">${serial}</td>
        <td class="title-cell">${titleHtml}</td>
        <td><span class="cat-badge">${item.category}</span></td>
        <td><span class="type-badge">${item.video_type}</span></td>
        <td class="date-cell">${item.date_posted}</td>
        <td><div class="badge-row">${badges}</div></td>
      </tr>
    `;
  }).join('');
}

loadData();
</script>

</body>
</html>
